name: doctor

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      force_analyze:
        description: Force analyze outside configured analyze day
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  issues: read
  pull-requests: read
  actions: read

env:
  SOURCE_REPO: G-Core/agent-toolkit
  REPORT_TZ: UTC
  PYTHON_VERSION: '3.12'
  ANALYZE_DAY: monday

jobs:
  resolve_analyze:
    runs-on: ${{ vars.DOCTOR_RUNS_ON || 'self-hosted-ubuntu-22-04-light-x64' }}
    outputs:
      provider: ${{ steps.resolve.outputs.provider }}
      skip_reason: ${{ steps.resolve.outputs.skip_reason }}
    steps:
      - name: Resolve analyze provider
        id: resolve
        shell: bash
        env:
          REQUESTED_PROVIDER: ${{ vars.DOCTOR_AI_PROVIDER || 'auto' }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets[vars.DOCTOR_CLAUDE_OAUTH_SECRET_NAME || 'CLAUDE_CODE_OAUTH_TOKEN'] || secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets[vars.DOCTOR_ANTHROPIC_SECRET_NAME || 'ANTHROPIC_API_KEY'] || secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets[vars.DOCTOR_OPENAI_SECRET_NAME || 'OPENAI_API_KEY'] || secrets.OPENAI_API_KEY }}
        run: |
          set -eu

          requested="${REQUESTED_PROVIDER:-auto}"
          provider="none"
          skip_reason=""

          case "$requested" in
            none)
              skip_reason="provider_disabled"
              ;;
            auto)
              if [ -n "${CLAUDE_CODE_OAUTH_TOKEN:-}" ] || [ -n "${ANTHROPIC_API_KEY:-}" ]; then
                provider="claude"
              elif [ -n "${OPENAI_API_KEY:-}" ]; then
                provider="codex"
              else
                skip_reason="no_ai_credentials"
              fi
              ;;
            claude)
              if [ -z "${CLAUDE_CODE_OAUTH_TOKEN:-}" ] && [ -z "${ANTHROPIC_API_KEY:-}" ]; then
                skip_reason="claude_credentials_missing"
              else
                provider="claude"
              fi
              ;;
            codex)
              if [ -z "${OPENAI_API_KEY:-}" ]; then
                skip_reason="codex_credentials_missing"
              else
                provider="codex"
              fi
              ;;
            *)
              echo "::error::invalid DOCTOR_AI_PROVIDER '$requested'. Expected auto, claude, codex, or none."
              exit 1
              ;;
          esac

          echo "provider=$provider" >> "$GITHUB_OUTPUT"
          echo "skip_reason=$skip_reason" >> "$GITHUB_OUTPUT"

  collect:
    runs-on: ${{ vars.DOCTOR_RUNS_ON || 'self-hosted-ubuntu-22-04-light-x64' }}
    outputs:
      should_act: ${{ steps.collect.outputs.should_act }}
      source_sha: ${{ steps.collect.outputs.source_sha }}
      installed_source_sha: ${{ steps.collect.outputs.installed_source_sha }}
      installed_runtime_sha: ${{ steps.collect.outputs.installed_runtime_sha }}
      act_reason: ${{ steps.collect.outputs.act_reason }}
      analyze_day: ${{ steps.collect.outputs.analyze_day }}
      report_tz: ${{ steps.collect.outputs.report_tz }}
      observed_findings_present: ${{ steps.collect.outputs.observed_findings_present }}
      findings_artifact_name: ${{ steps.collect.outputs.findings_artifact_name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Checkout toolkit source
        uses: actions/checkout@v4
        with:
          repository: ${{ env.SOURCE_REPO }}
          ref: main
          path: .doctor-source
          token: ${{ secrets[vars.DOCTOR_SOURCE_TOKEN_SECRET_NAME || 'ORG_GH_TOKEN_CI'] || secrets.ORG_GH_TOKEN_CI || secrets.TOOLKIT_READ_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Run collect
        id: collect
        env:
          DOCTOR_REPO_ROOT: ${{ github.workspace }}
          DOCTOR_OUTPUT_DIR: ${{ runner.temp }}/doctor
          DOCTOR_SOURCE_ROOT: ${{ github.workspace }}/.doctor-source
          DOCTOR_REPO_FULL_NAME: ${{ github.repository }}
          DOCTOR_REPO_DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          DOCTOR_SOURCE_REPO: ${{ env.SOURCE_REPO }}
          DOCTOR_SOURCE_BRANCH: main
          DOCTOR_ANALYZE_DAY: ${{ env.ANALYZE_DAY }}
          DOCTOR_REPORT_TZ: ${{ env.REPORT_TZ }}
        run: python .doctor-source/workflows/runtime/collect.py

      - name: Upload doctor-findings artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.collect.outputs.findings_artifact_name }}
          path: ${{ runner.temp }}/doctor/doctor-findings.json
          if-no-files-found: error

  act:
    needs: collect
    if: ${{ needs.collect.outputs.should_act == 'true' }}
    runs-on: ${{ vars.DOCTOR_RUNS_ON || 'self-hosted-ubuntu-22-04-light-x64' }}
    permissions:
      contents: write
      pull-requests: write
      actions: read
    steps:
      - name: Checkout target repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Download doctor-findings artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.collect.outputs.findings_artifact_name }}
          path: ${{ runner.temp }}/doctor-findings

      - name: Checkout toolkit source
        uses: actions/checkout@v4
        with:
          repository: ${{ env.SOURCE_REPO }}
          ref: main
          path: .doctor-source
          token: ${{ secrets[vars.DOCTOR_SOURCE_TOKEN_SECRET_NAME || 'ORG_GH_TOKEN_CI'] || secrets.ORG_GH_TOKEN_CI || secrets.TOOLKIT_READ_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Run act
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DOCTOR_REPO_ROOT: ${{ github.workspace }}
          DOCTOR_SOURCE_ROOT: ${{ github.workspace }}/.doctor-source
          DOCTOR_FINDINGS_PATH: ${{ runner.temp }}/doctor-findings/doctor-findings.json
          DOCTOR_SOURCE_SHA: ${{ needs.collect.outputs.source_sha }}
          DOCTOR_INSTALLED_SOURCE_SHA: ${{ needs.collect.outputs.installed_source_sha }}
          DOCTOR_INSTALLED_RUNTIME_SHA: ${{ needs.collect.outputs.installed_runtime_sha }}
          DOCTOR_ACT_REASON: ${{ needs.collect.outputs.act_reason }}
          DOCTOR_DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          DOCTOR_SOURCE_REPO: ${{ env.SOURCE_REPO }}
          DOCTOR_WORKFLOW_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: python .doctor-source/workflows/act.py

  analyze_claude:
    needs:
      - resolve_analyze
      - collect
      - act
    if: >-
      ${{
        always() &&
        needs.resolve_analyze.result == 'success' &&
        needs.resolve_analyze.outputs.provider == 'claude' &&
        needs.collect.result == 'success' &&
        (needs.act.result == 'success' || needs.act.result == 'skipped')
      }}
    # Required for reusable gh-aw analyze with safe outputs. GitHub validates
    # the caller permission envelope before analyze starts; the current
    # compiled lock also requests discussions: write.
    permissions:
      actions: read
      contents: read
      issues: write
      pull-requests: write
      discussions: write
    uses: G-Core/agent-toolkit/.github/workflows/doctor-analyze.lock.yml@main
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets[vars.DOCTOR_CLAUDE_OAUTH_SECRET_NAME || 'CLAUDE_CODE_OAUTH_TOKEN'] || secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      ANTHROPIC_API_KEY: ${{ secrets[vars.DOCTOR_ANTHROPIC_SECRET_NAME || 'ANTHROPIC_API_KEY'] || secrets.ANTHROPIC_API_KEY }}
      GH_AW_GITHUB_TOKEN: ${{ secrets[vars.DOCTOR_GITHUB_TOKEN_SECRET_NAME || 'GH_AW_GITHUB_TOKEN'] || secrets.GH_AW_GITHUB_TOKEN }}
      GH_AW_GITHUB_MCP_SERVER_TOKEN: ${{ secrets[vars.DOCTOR_GITHUB_MCP_TOKEN_SECRET_NAME || 'GH_AW_GITHUB_MCP_SERVER_TOKEN'] || secrets.GH_AW_GITHUB_MCP_SERVER_TOKEN }}
    with:
      force_analyze: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.force_analyze == 'true' }}
      analyze_day: ${{ needs.collect.outputs.analyze_day }}
      report_tz: ${{ needs.collect.outputs.report_tz }}
      issues_enabled: ${{ github.event.repository.has_issues && 'true' || 'false' }}
      observed_findings_present: ${{ needs.collect.outputs.observed_findings_present }}
      findings_artifact_name: ${{ needs.collect.outputs.findings_artifact_name }}
      source_sha: ${{ needs.collect.outputs.source_sha }}
      installed_source_sha: ${{ needs.collect.outputs.installed_source_sha }}
      installed_runtime_sha: ${{ needs.collect.outputs.installed_runtime_sha }}

  analyze_codex:
    needs:
      - resolve_analyze
      - collect
      - act
    if: >-
      ${{
        always() &&
        needs.resolve_analyze.result == 'success' &&
        needs.resolve_analyze.outputs.provider == 'codex' &&
        needs.collect.result == 'success' &&
        (needs.act.result == 'success' || needs.act.result == 'skipped')
      }}
    permissions:
      actions: read
      contents: read
      issues: write
      pull-requests: write
      discussions: write
    uses: G-Core/agent-toolkit/.github/workflows/doctor-analyze-codex.lock.yml@main
    secrets:
      CODEX_API_KEY: ${{ secrets[vars.DOCTOR_OPENAI_SECRET_NAME || 'OPENAI_API_KEY'] || secrets.OPENAI_API_KEY }}
      OPENAI_API_KEY: ${{ secrets[vars.DOCTOR_OPENAI_SECRET_NAME || 'OPENAI_API_KEY'] || secrets.OPENAI_API_KEY }}
      GH_AW_GITHUB_TOKEN: ${{ secrets[vars.DOCTOR_GITHUB_TOKEN_SECRET_NAME || 'GH_AW_GITHUB_TOKEN'] || secrets.GH_AW_GITHUB_TOKEN }}
      GH_AW_GITHUB_MCP_SERVER_TOKEN: ${{ secrets[vars.DOCTOR_GITHUB_MCP_TOKEN_SECRET_NAME || 'GH_AW_GITHUB_MCP_SERVER_TOKEN'] || secrets.GH_AW_GITHUB_MCP_SERVER_TOKEN }}
    with:
      force_analyze: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.force_analyze == 'true' }}
      analyze_day: ${{ needs.collect.outputs.analyze_day }}
      report_tz: ${{ needs.collect.outputs.report_tz }}
      issues_enabled: ${{ github.event.repository.has_issues && 'true' || 'false' }}
      observed_findings_present: ${{ needs.collect.outputs.observed_findings_present }}
      findings_artifact_name: ${{ needs.collect.outputs.findings_artifact_name }}
      source_sha: ${{ needs.collect.outputs.source_sha }}
      installed_source_sha: ${{ needs.collect.outputs.installed_source_sha }}
      installed_runtime_sha: ${{ needs.collect.outputs.installed_runtime_sha }}

  analyze:
    needs:
      - resolve_analyze
      - collect
      - act
      - analyze_claude
      - analyze_codex
    if: >-
      ${{
        always() &&
        needs.collect.result == 'success' &&
        (needs.act.result == 'success' || needs.act.result == 'skipped') &&
        (needs.resolve_analyze.result == 'success' || needs.resolve_analyze.result == 'failure')
      }}
    runs-on: ${{ vars.DOCTOR_RUNS_ON || 'self-hosted-ubuntu-22-04-light-x64' }}
    steps:
      - name: Finalize analyze result
        shell: bash
        run: |
          set -eu

          if [ "${{ needs.resolve_analyze.result }}" != "success" ]; then
            echo "Analyze provider resolution failed"
            exit 1
          fi

          case "${{ needs.resolve_analyze.outputs.provider }}" in
            none)
              if [ -n "${{ needs.resolve_analyze.outputs.skip_reason }}" ]; then
                echo "::notice::doctor analyze skipped: ${{ needs.resolve_analyze.outputs.skip_reason }}"
              else
                echo "::notice::doctor analyze skipped"
              fi
              ;;
            claude)
              if [ "${{ needs.analyze_claude.result }}" != "success" ]; then
                echo "Claude analyze job finished with result: ${{ needs.analyze_claude.result }}"
                exit 1
              fi
              ;;
            codex)
              if [ "${{ needs.analyze_codex.result }}" != "success" ]; then
                echo "Codex analyze job finished with result: ${{ needs.analyze_codex.result }}"
                exit 1
              fi
              ;;
            *)
              echo "Unknown analyze provider: ${{ needs.resolve_analyze.outputs.provider }}"
              exit 1
              ;;
          esac
