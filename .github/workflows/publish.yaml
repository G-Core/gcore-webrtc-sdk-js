name: Publish on CDN

on:
  workflow_call:
    inputs:
      version:
        type: string
        description: 'Version to publish, e.g. v0.89.19, must be published to NPM first'
      latest:
        type: boolean
        description: 'Whether to publish the latest version'
        default: false
  workflow_dispatch:
    inputs:
      version:
        type: string
        description: 'Version to publish, e.g. v0.89.19, must be published to NPM first'
      latest:
        type: boolean
        description: 'Whether to publish the latest version'
        default: false

permissions:
  contents: read

jobs:
  publish:
    runs-on:
      - ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          sparse-checkout: |
            ci
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11.2'
          cache-dependency-path: ci/requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install -r ci/requirements.txt
      - id: version
        run: |
          VERSION=${{ inputs.version }}
          echo "version=${VERSION#v}" >> $GITHUB_OUTPUT
      - name: Download dist archive
        run: |
          VERSION=${{ steps.version.outputs.version }}
          curl \
            -LSfs \
            -o package.tgz \
            https://registry.npmjs.org/@gcorevideo/${{ env.PACKAGE }}/-/${{ env.PACKAGE }}-$VERSION.tgz
          tar xf package.tgz
      - name: Upload to S3
        run: |
          LIBDIR=`pwd`/ci
          VERSION=${{ steps.version.outputs.version }}
          cd package/dist
          python $LIBDIR/sri.py \
            -a sha256 \
            ./*.* > ./SHA256.txt
          python $LIBDIR/upload-s3.py \
            --endpoint https://${{ env.S3_HOSTNAME }} \
            --bucket ${{ env.S3_BUCKET }} \
            . \
            $VERSION
          echo "OK published as ${{ env.CDN_URL }}/$VERSION/index.js"
          if [ "${{ inputs.latest }}" = true ]; then
            python $LIBDIR/upload-s3.py \
              --endpoint https://${{ env. S3_HOSTNAME }} \
              --bucket ${{ env.S3_BUCKET }} \
              . \
              latest
            echo "OK published ${{ env.CDN_URL }}/latest/[...] -> ${{ env.CDN_URL }}/$VERSION/[...]"
          fi
        env:
          S3_HOSTNAME: ${{ secrets.S3_HOSTNAME }}
          S3_ACCESS_KEY: ${{ secrets.S3_ACCESS_KEY }}
          S3_SECRET_KEY: ${{ secrets.S3_SECRET_KEY }}
          S3_BUCKET: rtckit
    env:
      PACKAGE: rtckit
      CDN_URL: https://rtckit.gvideo.io/
